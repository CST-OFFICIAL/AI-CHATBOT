<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHA-LUNG CHATBOT</title>
    <style>
        /* Modern System-Driven Design Tokens */
        :root {
            --bg-app: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            
            /* Chat Bubble Specs */
            --bg-ai-bubble: #ffffff;
            --text-ai-bubble: #0f172a;
            --border-ai-bubble: #e2e8f0;
            
            --bg-user-bubble: #0f172a;
            --text-user-bubble: #ffffff;
            
            --shadow-subtle: 0 4px 12px rgba(15, 23, 42, 0.03);
            --shadow-layout: 0 20px 40px rgba(15, 23, 42, 0.04);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-app: #09090b;
                --surface: #141417;
                --border: #27272a;
                --text-primary: #f4f4f5;
                --text-secondary: #a1a1aa;
                --text-muted: #52525b;
                
                /* Dark Chat Bubble Specs */
                --bg-ai-bubble: #1e1e22;
                --text-ai-bubble: #f4f4f5;
                --border-ai-bubble: #27272a;
                
                --bg-user-bubble: #f4f4f5;
                --text-user-bubble: #09090b;
                
                --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.1);
                --shadow-layout: 0 20px 40px rgba(0, 0, 0, 0.3);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-app);
            color: var(--text-primary);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease;
        }

        /* Clean Centerpiece Workspace Layout */
        .chat-frame { 
            width: 100%; 
            max-width: 840px; 
            height: 90vh; 
            background: var(--surface); 
            border-radius: 16px; 
            box-shadow: var(--shadow-layout);
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            border: 1px solid var(--border);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .chat-header { 
            padding: 20px 32px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .chat-header h1 { 
            font-size: 15px; 
            font-weight: 600; 
            letter-spacing: -0.01em;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
        }

        /* Pure Left/Right Splitting Stream Architecture */
        .messages-container { 
            flex: 1; 
            padding: 32px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            scroll-behavior: smooth;
        }
        .messages-container::-webkit-scrollbar { width: 0px; }

        .message-row {
            display: flex;
            width: 100%;
            gap: 16px;
            opacity: 0;
            transform: translateY(10px);
            animation: cleanEntry 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes cleanEntry { to { opacity: 1; transform: translateY(0); } }

        /* Left Split (AI Alignment) */
        .message-row.ai {
            justify-content: flex-start;
            flex-direction: row;
        }

        /* Right Split (User Alignment Fixed) */
        .message-row.user {
            flex-direction: row-reverse; 
            justify-content: flex-start; 
        }

        /* Premium SVG Avatar Nodes */
        .avatar-node {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }
        .message-row.ai .avatar-node {
            background: var(--text-primary);
            color: var(--surface);
        }
        .message-row.user .avatar-node {
            background: var(--border);
            color: var(--text-secondary);
        }
        .avatar-node svg { width: 16px; height: 16px; }

        .message-content-block {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            gap: 4px;
        }
        .message-row.ai .message-content-block { align-items: flex-start; }
        .message-row.user .message-content-block { align-items: flex-end; }

        .sender-tag {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .message { 
            padding: 12px 18px; 
            border-radius: 12px; 
            font-size: 14.5px; 
            line-height: 1.55; 
            word-break: break-word;
            box-shadow: var(--shadow-subtle);
        }

        /* Distinct Left vs Right Bubble Styling */
        .message-row.ai .message { 
            background: var(--bg-ai-bubble); 
            color: var(--text-ai-bubble); 
            border: 1px solid var(--border-ai-bubble);
            border-top-left-radius: 2px;
        }

        .message-row.user .message { 
            background: var(--bg-user-bubble); 
            color: var(--text-user-bubble); 
            border-top-right-radius: 2px;
            text-align: left;
        }

        .message strong { font-weight: 600; color: inherit; }
        .message br { content: ""; display: block; margin-bottom: 8px; }

        /* Document Integrated Typing Framework */
        .typing-row {
            display: none;
            gap: 16px;
            width: 100%;
            justify-content: flex-start;
        }

        .typing-indicator {
            background: var(--bg-ai-bubble);
            border: 1px solid var(--border-ai-bubble);
            padding: 14px 20px;
            border-radius: 12px;
            border-top-left-radius: 2px;
            gap: 4px;
            display: flex;
            align-items: center;
        }

        .typing-dot {
            width: 5px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: pulseDot 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulseDot { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Unified Control Bar Input Deck */
        .chat-input-area { 
            padding: 24px 32px 32px 32px; 
            background: var(--surface); 
            border-top: 1px solid var(--border); 
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input { 
            width: 100%;
            padding: 14px 54px 14px 18px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-size: 14.5px; 
            outline: none; 
            background: var(--surface);
            color: var(--text-primary);
            transition: border-color 0.2s ease;
        }

        input:focus { 
            border-color: var(--text-primary); 
        }

        button { 
            position: absolute;
            right: 8px;
            background: transparent;
            border: none; 
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px; 
            cursor: pointer; 
            color: var(--text-primary);
            transition: background 0.2s ease;
        }
        button:hover { background: var(--bg-app); }
        button:disabled { color: var(--text-muted); cursor: not-allowed; background: transparent; }
        button svg { width: 16px; height: 16px; }
    </style>
</head>
<body>

<div class="chat-frame">
    <div class="chat-header">
        <h1>PHA-LUNG Workspace</h1>
        <div class="status-container">
            <div class="status-dot"></div>
            <span>Online</span>
        </div>
    </div>
    
    <div class="messages-container" id="chatMessages">
        <div class="message-row ai">
            <div class="avatar-node">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4 12H2M22 12h-2M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/></svg>
            </div>
            <div class="message-content-block">
                <span class="sender-tag">PHA-LUNG</span>
                <div class="message">Hello. I am PHA-LUNG, an AI assistant built inside this workspace. How can I help you today?</div>
            </div>
        </div>
        
        <div class="typing-row" id="typingRow">
            <div class="avatar-node">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4 12H2M22 12h-2M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/></svg>
            </div>
            <div class="message-content-block">
                <span class="sender-tag">PHA-LUNG</span>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="chat-input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Message PHA-LUNG..." autocomplete="off">
            <button id="sendBtn" title="Send command">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingRow = document.getElementById('typingRow');

    // MUST USE 'LET' FOR MEMORY SLICING TO WORK APART FROM CRASHES
    let conversationHistory = [
        { 
            role: "system", 
            content: "You are PHA-LUNG, a chill, intelligent AI assistant inside this chat workspace. Keep your tone natural, direct, and relaxed. Follow these strict information levels:\n\nLEVEL 1 - SELF INTRODUCTION: If asked to introduce yourself or 'who are you', ONLY talk about yourself. Say you are PHA-LUNG, an AI helper here to chat or brainstorm. Do NOT mention CST, do NOT mention who built you, and do NOT give any background history.\n\nLEVEL 2 - THE CREATOR (Only if asked 'Who built you?' or 'How was this made?'): State casually that this custom workspace and layout was designed and built by the developer CST using modern dev workflows, and you are the AI API integrated into it. Do NOT mention a real name here.\n\nLEVEL 3 - DEEP DIGGING (Only if asked 'Who is CST?', 'What does CST stand for?', or for a real name): Reveal that his real name is Debabrata Rajkhowa. Otherwise, never mention this name." 
        }
    ];

    function cleanFormat(text) {
        let clean = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        clean = clean.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        return clean.replace(/\n/g, '<br>');
    }

    function appendMessage(text, sender) {
        const row = document.createElement('div');
        row.classList.add('message-row', sender);
        
        let avatarMarkup = sender === 'ai' 
            ? `<div class="avatar-node"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4 12H2M22 12h-2M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/></svg></div>` 
            : `<div class="avatar-node"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>`;
        
        let labelName = sender === 'ai' ? 'PHA-LUNG' : 'YOU';

        row.innerHTML = `
            ${avatarMarkup}
            <div class="message-content-block">
                <span class="sender-tag">${labelName}</span>
                <div class="message">${cleanFormat(text)}</div>
            </div>
        `;
        
        chatMessages.insertBefore(row, typingRow);
        
        setTimeout(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 20);
    }

    async function handleChat() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        
        sendBtn.disabled = true;
        typingRow.style.display = 'flex';
        chatMessages.scrollTop = chatMessages.scrollHeight;

        conversationHistory.push({ role: "user", content: text });

        // Rolling memory window protection to avoid 10-minute timeout drops
        if (conversationHistory.length > 13) {
            conversationHistory = [
                conversationHistory[0],
                ...conversationHistory.slice(-12)
            ];
        }

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: conversationHistory })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Server Error");

            const aiResponse = data.choices[0].message.content;
            appendMessage(aiResponse, 'ai');
            conversationHistory.push({ role: "assistant", content: aiResponse });
        } catch (error) {
            appendMessage("API connection dropped. Please check deployment settings.", 'ai');
        } finally {
            sendBtn.disabled = false;
            typingRow.style.display = 'none';
        }
    }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleChat();
    });
</script>

</body>
</html>
