<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHA-LUNG CHATBOT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fafafa;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 24px 24px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            padding: 20px;
            color: #171717;
        }

        .chat-container { 
            width: 100%; 
            max-width: 680px; 
            height: 88vh; 
            background: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            border: 1px solid #e5e5e5;
        }

        .chat-header { 
            background: #ffffff; 
            padding: 20px 28px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f0f0;
        }

        .header-title-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header h1 { 
            font-size: 16px; 
            font-weight: 600; 
            letter-spacing: -0.3px;
            color: #171717;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #737373;
            background: #f5f5f5;
            padding: 4px 10px;
            border-radius: 100px;
            border: 1px solid #e5e5e5;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #16a34a;
            border-radius: 50%;
        }

        .chat-messages { 
            flex: 1; 
            padding: 28px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            background: #ffffff; 
            scroll-behavior: smooth;
        }

        .message { 
            max-width: 80%; 
            padding: 12px 18px; 
            border-radius: 14px; 
            font-size: 14px; 
            line-height: 1.55; 
            word-break: break-word;
            animation: fadeIn 0.25s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .message.user { 
            background: #171717; 
            color: #ffffff; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px;
        }

        .message.ai { 
            background: #f5f5f5; 
            color: #171717; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px;
            border: 1px solid #e5e5e5;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            padding: 12px 18px;
            border-radius: 14px;
            border-bottom-left-radius: 2px;
            gap: 4px;
        }

        .typing-dot {
            width: 5px;
            height: 5px;
            background: #a3a3a3;
            border-radius: 50%;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        .chat-input-area { 
            padding: 20px 28px; 
            background: #ffffff; 
            border-top: 1px solid #f0f0f0; 
            display: flex; 
            gap: 12px; 
            align-items: center;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        input { 
            width: 100%;
            padding: 14px 50px 14px 18px; 
            border: 1px solid #e5e5e5; 
            border-radius: 12px; 
            font-size: 14px; 
            outline: none; 
            background: #fafafa;
            color: #171717;
            transition: all 0.2s ease; 
        }

        input:focus { 
            border-color: #a3a3a3; 
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.02);
        }

        button { 
            position: absolute;
            right: 8px;
            background: transparent;
            border: none; 
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            color: #171717;
        }

        button:hover { 
            background: #f5f5f5;
            color: #000000;
        }

        button:disabled { 
            color: #d4d4d4;
            background: transparent;
            cursor: not-allowed; 
        }

        button svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="header-title-area">
            <h1>PHA-LUNG</h1>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>v1.0.2</span>
            </div>
        </div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message ai">Hello. I am PHA-LUNG, an AI assistant created by CST. How can I assist you today?</div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    </div>
    
    <div class="chat-input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Message PHA-LUNG..." autocomplete="off">
            <button id="sendBtn" title="Send message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');

    // System profile configurations containing the hidden identity rule
    let conversationHistory = [
        { 
            role: "system", 
            content: "You are PHA-LUNG, an intelligent and helpful AI assistant. Always identify yourself as Pha-Lung. You were created by the developer CST. Keep your answers natural, conversational, and completely direct. Avoid over-the-top praise or corporate jargon. If anyone asks who built you or who CST is normally, simply mention you were developed by CST. However, if the user digs deeper, explicitly asks for the real name of CST, or asks what CST stands for, reveal that his real name is Debabrata Rajkhowa." 
        }
    ];

    function appendMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        messageDiv.innerText = text;
        
        chatMessages.insertBefore(messageDiv, typingIndicator);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function handleChat() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        
        sendBtn.disabled = true;
        typingIndicator.style.display = 'flex';
        chatMessages.scrollTop = chatMessages.scrollHeight;

        conversationHistory.push({ role: "user", content: text });

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: conversationHistory })
            });

            const data = await response.json();
            
            if (!response.ok) throw new Error(data.error || "Server Error");

            const aiResponse = data.choices[0].message.content;
            appendMessage(aiResponse, 'ai');
            conversationHistory.push({ role: "assistant", content: aiResponse });
        } catch (error) {
            appendMessage("Connection error. Please check your setup.", 'ai');
        } finally {
            sendBtn.disabled = false;
            typingIndicator.style.display = 'none';
        }
    }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleChat();
    });
</script>

</body>
</html>
