<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHA-LUNG CHATBOT</title>
    <style>
        :root {
            --bg-main: #fafafa;
            --surface: #ffffff;
            --border: #e5e5e5;
            --border-focus: #171717;
            --text-main: #171717;
            --text-muted: #737373;
            --accent: #171717;
            --chat-bg-user: #171717;
            --chat-text-user: #ffffff;
            --chat-bg-ai: #f5f5f5;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main);
            background-image: radial-gradient(rgba(0, 0, 0, 0.03) 1.5px, transparent 1.5px);
            background-size: 32px 32px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            padding: 24px;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .chat-container { 
            width: 100%; 
            max-width: 720px; 
            height: 88vh; 
            background: var(--surface); 
            border-radius: 24px; 
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.04), 0 2px 8px rgba(0, 0, 0, 0.01);
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            border: 1px solid var(--border);
            will-change: transform;
        }

        .chat-header { 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 22px 32px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .header-title-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header h1 { 
            font-size: 15px; 
            font-weight: 600; 
            letter-spacing: -0.2px;
            color: var(--text-main);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            background: #f4f4f5;
            padding: 4px 10px;
            border-radius: 100px;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            position: relative;
        }
        .status-dot::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: inherit;
            border-radius: inherit;
            animation: ripple 2s infinite ease-out;
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .chat-messages { 
            flex: 1; 
            padding: 32px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            background: var(--surface); 
            scroll-behavior: smooth;
        }

        /* Hide Scrollbar for ultra-clean layout */
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 10px; }

        .message-wrapper {
            display: flex;
            width: 100%;
            flex-direction: column;
        }

        .message { 
            max-width: 82%; 
            padding: 14px 20px; 
            border-radius: 16px; 
            font-size: 14.5px; 
            line-height: 1.6; 
            word-break: break-word;
            opacity: 0;
            transform: translateY(16px) scale(0.98);
            animation: messageEntry 0.45s var(--ease-out-expo) forwards;
            will-change: transform, opacity;
        }

        @keyframes messageEntry {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.user { 
            background: var(--chat-bg-user); 
            color: var(--chat-text-user); 
            align-self: flex-end; 
            border-bottom-right-radius: 4px;
        }

        .message.ai { 
            background: var(--chat-bg-ai); 
            color: var(--text-main); 
            align-self: flex-start; 
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        /* Style inner elements built by the custom parser */
        .message strong { font-weight: 600; color: inherit; }
        .message br { content: ""; display: block; margin-bottom: 8px; }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--chat-bg-ai);
            border: 1px solid var(--border);
            padding: 14px 22px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            gap: 5px;
            align-items: center;
            animation: messageEntry 0.3s var(--ease-out-expo) forwards;
        }

        .typing-dot {
            width: 5px;
            height: 5px;
            background: #a3a3a3;
            border-radius: 50%;
            animation: typingPulse 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingPulse {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-4px); opacity: 1; }
        }

        .chat-input-area { 
            padding: 24px 32px 32px 32px; 
            background: var(--surface); 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 12px; 
            align-items: center;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        input { 
            width: 100%;
            padding: 16px 54px 16px 20px; 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            font-size: 14.5px; 
            outline: none; 
            background: #fafafa;
            color: var(--text-main);
            transition: all 0.25s var(--ease-out-expo); 
        }

        input:focus { 
            border-color: var(--border-focus); 
            background: var(--surface);
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.02);
        }

        button { 
            position: absolute;
            right: 10px;
            background: transparent;
            border: none; 
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            color: var(--text-main);
        }

        button:hover { 
            background: #f4f4f5;
            color: #000000;
        }

        button:active {
            transform: scale(0.92);
        }

        button:disabled { 
            color: #d4d4d4;
            background: transparent;
            cursor: not-allowed; 
            transform: none;
        }

        button svg {
            width: 18px;
            height: 18px;
            transition: transform 0.2s ease;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="header-title-area">
            <h1>PHA-LUNG</h1>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Engine Active</span>
            </div>
        </div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message ai">Hello. I am PHA-LUNG, an AI assistant created by CST. How can I assist you today?</div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    </div>
    
    <div class="chat-input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ask PHA-LUNG a question..." autocomplete="off">
            <button id="sendBtn" title="Send message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');

    let conversationHistory = [
        { 
            role: "system", 
            content: "You are PHA-LUNG, an intelligent and helpful AI assistant. Always identify yourself as Pha-Lung. You were created by the developer CST. Keep your answers natural, conversational, and completely direct. Avoid over-the-top praise or corporate jargon. If anyone asks who built you or who CST is normally, simply mention you were developed by CST. However, if the user digs deeper, explicitly asks for the real name of CST, or asks what CST stands for, reveal that his real name is Debabrata Rajkhowa." 
        }
    ];

    // High-performance clean string formatter (Replaces messy third-party markdown dependencies)
    function cleanFormat(text) {
        let clean = text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        
        // Formats **bolding** natively
        clean = clean.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // Standardizes line returns seamlessly
        return clean.replace(/\n/g, '<br>');
    }

    function appendMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        
        // Inject cleanly parsed content strings
        messageDiv.innerHTML = cleanFormat(text);
        
        chatMessages.insertBefore(messageDiv, typingIndicator);
        
        // Smooth snap scrolling mechanism
        setTimeout(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 10);
    }

    async function handleChat() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        
        sendBtn.disabled = true;
        typingIndicator.style.display = 'flex';
        chatMessages.scrollTop = chatMessages.scrollHeight;

        conversationHistory.push({ role: "user", content: text });

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: conversationHistory })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Server Error");

            const aiResponse = data.choices[0].message.content;
            appendMessage(aiResponse, 'ai');
            conversationHistory.push({ role: "assistant", content: aiResponse });
        } catch (error) {
            appendMessage("Connection latency detected. Try reloading.", 'ai');
        } finally {
            sendBtn.disabled = false;
            typingIndicator.style.display = 'none';
        }
    }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleChat();
    });
</script>

</body>
</html>
