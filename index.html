<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHA-LUNG CHATBOT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            padding: 20px;
            color: #0f172a;
        }

        .chat-container { 
            width: 100%; 
            max-width: 600px; 
            height: 85vh; 
            background: #ffffff; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .chat-header { 
            background: #0f172a; 
            color: #ffffff; 
            padding: 24px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1e293b;
        }

        .header-title-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-header h1 { 
            font-size: 18px; 
            font-weight: 700; 
            letter-spacing: -0.5px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #94a3b8;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        .chat-messages { 
            flex: 1; 
            padding: 24px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            background: #f8fafc; 
            scroll-behavior: smooth;
        }

        .message { 
            max-width: 75%; 
            padding: 14px 18px; 
            border-radius: 18px; 
            font-size: 15px; 
            line-height: 1.6; 
            word-break: break-word;
            animation: slideUp 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { 
            background: #4f46e5; 
            color: #ffffff; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }

        .message.ai { 
            background: #ffffff; 
            color: #1e293b; 
            align-self: flex-start; 
            border-bottom-left-radius: 4px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(15, 23, 42, 0.02);
        }

        /* Loading Animation */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 14px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        .chat-input-area { 
            padding: 20px 24px; 
            background: #ffffff; 
            border-top: 1px solid #e2e8f0; 
            display: flex; 
            gap: 12px; 
            align-items: center;
        }

        input { 
            flex: 1; 
            padding: 14px 20px; 
            border: 1px solid #cbd5e1; 
            border-radius: 12px; 
            font-size: 15px; 
            outline: none; 
            background: #f8fafc;
            transition: all 0.2s ease; 
        }

        input:focus { 
            border-color: #4f46e5; 
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button { 
            background: #0f172a; 
            color: #ffffff; 
            border: none; 
            padding: 14px 28px; 
            font-size: 15px; 
            font-weight: 600; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
        }

        button:hover { 
            background: #1e293b; 
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled { 
            background: #cbd5e1; 
            cursor: not-allowed; 
            transform: none;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="header-title-area">
            <h1>PHA-LUNG CHATBOT</h1>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Next-Gen Systems</span>
            </div>
        </div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message ai" style="animation-delay: 0s;">Welcome to the PHA-LUNG interface. How can I assist with your operations today?</div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    </div>
    
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Ask a question..." autocomplete="off">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');

    let conversationHistory = [
        { role: "system", content: "You are PHA-LUNG CHATBOT, an ultra-intelligent, advanced corporate AI assistant designed for high-end technical and strategic operations." }
    ];

    function appendMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        messageDiv.innerText = text;
        
        // Always insert before the typing indicator loop
        chatMessages.insertBefore(messageDiv, typingIndicator);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function handleChat() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        
        sendBtn.disabled = true;
        typingIndicator.style.display = 'flex';
        chatMessages.scrollTop = chatMessages.scrollHeight;

        conversationHistory.push({ role: "user", content: text });

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: conversationHistory })
            });

            const data = await response.json();
            
            if (!response.ok) throw new Error(data.error || "Server Error");

            const aiResponse = data.choices[0].message.content;
            appendMessage(aiResponse, 'ai');
            conversationHistory.push({ role: "assistant", content: aiResponse });
        } catch (error) {
            appendMessage("System latency error: Connection to PHA-LUNG core failed.", 'ai');
        } finally {
            sendBtn.disabled = false;
            typingIndicator.style.display = 'none';
        }
    }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleChat();
    });
</script>

</body>
</html>
