<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHA-LUNG CHATBOT</title>
    <style>
        /* Premium Light Theme Design Tokens */
        :root {
            --bg-workspace: #ffffff;
            --bg-sidebar: #f8fafc;
            --surface-card: #ffffff;
            --border-main: #f1f5f9;
            --border-strong: #cbd5e1;
            
            --text-title: #0f172a;
            --text-body: #334155;
            --text-muted: #94a3b8;
            
            --chat-user-bg: #f1f5f9;
            --chat-user-text: #0f172a;
            --chat-ai-bg: transparent;
            
            --sidebar-width: 260px;
            --ease-premium: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Premium Dark Theme Design Tokens */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-workspace: #0b0b0f;
                --bg-sidebar: #121218;
                --surface-card: #161622;
                --border-main: #1e1e2f;
                --border-strong: #3f3f5f;
                
                --text-title: #f8fafc;
                --text-body: #cbd5e1;
                --text-muted: #64748b;
                
                --chat-user-bg: #1e1e2f;
                --chat-user-text: #f8fafc;
                --chat-ai-bg: transparent;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-workspace);
            color: var(--text-body);
            height: 100vh;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease;
        }

        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Sidebar Navigation Component */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-main);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            justify-content: space-between;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; } 
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border-strong);
            color: var(--text-title);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        .new-chat-btn:hover {
            background: var(--chat-user-bg);
        }

        .history-section {
            flex: 1;
            margin-top: 32px;
        }
        .history-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .history-item {
            font-size: 13px;
            color: var(--text-body);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        .history-item.active {
            background: var(--chat-user-bg);
            color: var(--text-title);
            font-weight: 500;
        }

        .creator-tag {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Main Workspace Interface */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-workspace);
            position: relative;
        }

        .workspace-header {
            padding: 18px 40px;
            border-bottom: 1px solid var(--border-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .workspace-header h1 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-title);
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            color: #10b981;
        }
        .status-indicator-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
        }

        /* Dynamic Message Stream Configuration */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            gap: 32px;
        }
        .chat-messages::-webkit-scrollbar { width: 0px; } 

        .message-row {
            display: flex;
            gap: 20px;
            width: 100%;
            opacity: 0;
            transform: translateY(16px);
            animation: appEntry 0.5s var(--ease-premium) forwards;
        }
        @keyframes appEntry { to { opacity: 1; transform: translateY(0); } }

        /* Left-Side AI Alignment */
        .message-row.ai {
            justify-content: flex-start;
        }

        /* Right-Side User Alignment */
        .message-row.user {
            justify-content: flex-end;
            flex-direction: row-reverse; /* Pushes user avatar to the far right */
        }

        .avatar-frame {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 700;
        }
        .avatar-frame.ai {
            background: var(--text-title);
            color: var(--bg-workspace);
        }
        .avatar-frame.user {
            background: var(--border-strong);
            color: var(--text-title);
        }

        .message-body-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 75%;
        }

        /* Alignment adjustment inside text container blocks */
        .message-row.ai .message-body-wrapper { align-items: flex-start; }
        .message-row.user .message-body-wrapper { align-items: flex-end; }

        .identity-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-title);
        }

        .message {
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
            color: var(--text-body);
        }

        /* Clean modern capsule formatting for the User on the right side */
        .message-row.user .message {
            padding: 12px 18px;
            background: var(--chat-user-bg);
            color: var(--chat-user-text);
            border-radius: 16px;
            border-top-right-radius: 2px; /* Precision styling tail */
            text-align: left;
        }

        /* Clean layout flow formatting for AI on the left side */
        .message-row.ai .message {
            padding: 4px 0;
        }

        .message strong { font-weight: 600; color: var(--text-title); }
        .message br { content: ""; display: block; margin-bottom: 10px; }

        /* Typist Positioning Matrix */
        .typing-row {
            display: none;
            gap: 20px;
            width: 100%;
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 24px;
        }
        .typing-dot {
            width: 5px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: saasPulse 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes saasPulse { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        /* Main Workspace Control Deck Entry Frame */
        .chat-input-area {
            padding: 24px 24px 40px 24px;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            background: var(--bg-workspace);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-workspace);
            border: 1px solid var(--border-strong);
            border-radius: 14px;
            padding: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-wrapper:focus-within {
            border-color: var(--text-title);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
        }

        input {
            flex: 1;
            padding: 14px 50px 14px 16px;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-title);
            font-size: 15px;
        }

        button {
            position: absolute;
            right: 8px;
            background: var(--text-title);
            color: var(--bg-workspace);
            border: none;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.95); }
        button:disabled {
            background: transparent;
            color: var(--text-muted);
            cursor: not-allowed;
        }
        button svg { width: 16px; height: 16px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="top-nav">
            <button class="new-chat-btn">
                <span>New session</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <div class="history-section">
                <div class="history-label">Recent Conversing</div>
                <div class="history-item active">Current Thread Overview</div>
            </div>
        </div>
        <div class="creator-tag">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Verified System Node</span>
        </div>
    </div>

    <div class="workspace">
        <div class="workspace-header">
            <h1>PHA-LUNG Workspace</h1>
            <div class="status-pill">
                <div class="status-indicator-dot"></div>
                <span>Active Engine</span>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message-row ai">
                <div class="avatar-frame ai">Φ</div>
                <div class="message-body-wrapper">
                    <span class="identity-label">PHA-LUNG</span>
                    <div class="message ai">Hello. I am PHA-LUNG, an AI assistant created by CST. How can I assist you today?</div>
                </div>
            </div>
            
            <div class="typing-row" id="typingRow">
                <div class="avatar-frame ai">...</div>
                <div class="message-body-wrapper">
                    <span class="identity-label">PHA-LUNG</span>
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask PHA-LUNG anything..." autocomplete="off">
                <button id="sendBtn" title="Transmit command">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingRow = document.getElementById('typingRow');

    let conversationHistory = [
        { 
            role: "system", 
            content: "You are PHA-LUNG, an intelligent and helpful AI assistant. Always identify yourself as Pha-Lung. You were created by the developer CST. Keep your answers natural, conversational, and completely direct. Avoid over-the-top praise or corporate jargon. If anyone asks who built you or who CST is normally, simply mention you were developed by CST. However, if the user digs deeper, explicitly asks for the real name of CST, or asks what CST stands for, reveal that his real name is Debabrata Rajkhowa." 
        }
    ];

    function cleanFormat(text) {
        let clean = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        clean = clean.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        return clean.replace(/\n/g, '<br>');
    }

    function appendMessage(text, sender) {
        const row = document.createElement('div');
        row.classList.add('message-row', sender);
        
        let avatarMarkup = sender === 'ai' 
            ? `<div class="avatar-frame ai">Φ</div>` 
            : `<div class="avatar-frame user">U</div>`;
        let labelName = sender === 'ai' ? 'PHA-LUNG' : 'YOU';

        row.innerHTML = `
            ${avatarMarkup}
            <div class="message-body-wrapper">
                <span class="identity-label">${labelName}</span>
                <div class="message">${cleanFormat(text)}</div>
            </div>
        `;
        
        chatMessages.insertBefore(row, typingRow);
        
        setTimeout(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 20);
    }

    async function handleChat() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        
        sendBtn.disabled = true;
        typingRow.style.display = 'flex';
        chatMessages.scrollTop = chatMessages.scrollHeight;

        conversationHistory.push({ role: "user", content: text });

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: conversationHistory })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Server Error");

            const aiResponse = data.choices[0].message.content;
            appendMessage(aiResponse, 'ai');
            conversationHistory.push({ role: "assistant", content: aiResponse });
        } catch (error) {
            appendMessage("API routing error. Connection dropped.", 'ai');
        } finally {
            sendBtn.disabled = false;
            typingRow.style.display = 'none';
        }
    }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleChat();
    });
</script>

</body>
</html>
